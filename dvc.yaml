stages:
  data_ingestion:
    cmd: python src/data_steps/data_ingestion.py
    deps:
      - src/data_steps/data_ingestion.py
      - config.yaml
  
  data_preprocessing:
    cmd: python src/data_steps/data_preprocessing.py
    deps:
      - src/data_steps/data_preprocessing.py
      - config.yaml
  
  model_building:
    cmd: python src/model/model_training.py
    deps:
      - src/model/model_training.py
      - config.yaml